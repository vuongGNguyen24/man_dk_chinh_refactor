IsometricButton:
  function_enabled:
    topColor: "#00ffff"
    borderColor: "#000000"
    textColor: "#5f5f5f"
    iconColor: "#000000"
    iconAlpha: 255
    depth: 9.0
  enabled:
    topColor: "#C83232"
    borderColor: "rgba(255,255,255,48)"
    textColor: "#efefef"
    iconColor: "#000000"
    iconAlpha: 48
    depth: 9.0

  selected:
    topColor: "#00F000"
    borderColor: "#000000"
    textColor: "#000000"
    iconColor: "#000000"
    iconAlpha: 255
    depth: 3.0

  disabled:
    topColor: "#121212"
    borderColor: "rgba(255,255,255,48)"
    textColor: "rgba(255,255,255,48)"
    iconColor: "#ffffff"
    iconAlpha: 48
    depth: 3.0
