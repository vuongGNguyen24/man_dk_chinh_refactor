IsometricButton:
  default:
    topColor: "#00ffff"
    borderColor: "rgba(255,255,255,48)"
    textColor: "#000000"
    iconColor: "#000000"
    iconAlpha: 48
    depth: 5.0

  selected:
    topColor: "#ffffff"
    borderColor: "#000000"
    textColor: "#5f5f5f"
    iconColor: "#000000"
    iconAlpha: 255
    depth: 6.0

  disabled:
    topColor: "#121212"
    borderColor: "rgba(255,255,255,48)"
    textColor: "rgba(255,255,255,48)"
    iconColor: "#ffffff"
    iconAlpha: 48
    depth: 3.0
